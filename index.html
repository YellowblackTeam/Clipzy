<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Clipzy</title>

<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: black;
    font-family: Arial;
    overflow: hidden;
  }

  .feed {
    height: 100vh;
    overflow-y: scroll;
    scroll-snap-type: y mandatory;
  }

  .video {
    height: 100vh;
    width: 100vw;
    scroll-snap-align: start;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .info {
    position: absolute;
    bottom: 90px;
    left: 15px;
    color: white;
  }

  .bottom-bar {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 60px;
    background: rgba(0,0,0,0.8);
    display: flex;
    justify-content: space-around;
    align-items: center;
    backdrop-filter: blur(10px);
  }

  .btn {
    color: white;
    text-decoration: none;
    font-size: 12px;
  }

  .active {
    color: red;
  }
</style>
</head>

<body>

<div class="feed" id="feed"></div>

<div class="bottom-bar">
  <a class="btn active" href="index.html">Home</a>
  <a class="btn" href="#">Discover</a>
  <a class="btn" href="create.html">Create</a>
  <a class="btn" href="#">Notif</a>
  <a class="btn" href="#">Profile</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://vbxmehiagwjfjmswihwp.supabase.co/rest/v1/";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZieG1laGlhZ3dqZmptc3dpaHdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1ODY3OTcsImV4cCI6MjA5ODE2Mjc5N30.QTdrQygjdwJahpK-jK9HG0vAAsfy0uWk4ojXW4Tv-oo";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadVideos() {
  const { data } = await supabase
    .from("videos")
    .select("*")
    .order("created_at", { ascending: false });

  const feed = document.getElementById("feed");

  data.forEach(v => {
    const div = document.createElement("div");
    div.className = "video";

    div.innerHTML = `
      <video class="clip" muted loop playsinline>
        <source src="${v.video_url}">
      </video>

      <div class="info">
        <b>@${v.user_id}</b><br>
        ${v.caption}
      </div>
    `;

    feed.appendChild(div);
  });

  setupAutoPlay();
}

function setupAutoPlay() {
  const videos = document.querySelectorAll("video");

  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      const vid = e.target;

      if (e.isIntersecting) {
        videos.forEach(v => v.pause());
        vid.play().catch(() => {});
      } else {
        vid.pause();
      }
    });
  }, { threshold: 0.8 });

  videos.forEach(v => obs.observe(v));
}

loadVideos();
</script>

</body>
</html>
