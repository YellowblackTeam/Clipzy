<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Clipzy</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<script type="module" src="https://esm.run/@material/web/all.js"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
    overflow-y:scroll;
    scroll-snap-type:y mandatory;
}

#feed{
    width:100%;
    padding-bottom:80px;
}

.video-card{
    position:relative;
    width:100%;
    height:100vh;
    scroll-snap-align:start;
}

.video-card video{
    width:100%;
    height:100%;
    object-fit:cover;
    background:#000;
}

.info{
    position:absolute;
    left:15px;
    bottom:90px;
}

.info h2{
    font-size:20px;
}

.info p{
    opacity:.9;
}

.actions{
    position:absolute;
    right:15px;
    bottom:100px;

    display:flex;
    flex-direction:column;
    gap:18px;
    align-items:center;
}

.actions md-filled-tonal-icon-button{
    --md-filled-tonal-icon-button-container-color:#222;
}

.bottom-nav{
    position:fixed;
    bottom:0;
    left:0;
    right:0;

    height:70px;

    display:flex;
    justify-content:space-around;
    align-items:center;

    background:#111;
    border-top:1px solid #333;
}

.bottom-nav a{
    color:white;
    text-decoration:none;
    display:flex;
    flex-direction:column;
    align-items:center;
    font-size:12px;
}

.bottom-nav .material-symbols-outlined{
    font-size:28px;
}
  
.topbar{
    position:fixed;
    top:0;
    left:0;
    right:0;

    height:60px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 15px;

    background:linear-gradient(to bottom,rgba(0,0,0,.75),transparent);

    z-index:1000;
}

.logo{
    font-size:28px;
    font-weight:bold;
    color:white;
    letter-spacing:1px;
}

.info{
    position:absolute;
    left:15px;
    bottom:90px;
    max-width:70%;
}

.actions{
    position:absolute;
    right:15px;
    bottom:100px;

    display:flex;
    flex-direction:column;
    align-items:center;
    gap:14px;
}

.actions div{
    color:white;
    font-size:12px;
    text-align:center;
}
  
</style>
</head>
<body>

<div id="feed"></div>
  
<header class="topbar">

    <div class="logo">
        Clipzy
    </div>

    <md-filled-tonal-icon-button>
        <span class="material-symbols-outlined">
            search
        </span>
    </md-filled-tonal-icon-button>

</header>

<nav class="bottom-nav">

<a href="index.html">
<span class="material-symbols-outlined">
home
</span>
Home
</a>

<a href="#">
<span class="material-symbols-outlined">
travel_explore
</span>
Descobrir
</a>

<a href="#">
<span class="material-symbols-outlined">
add_box
</span>
Create
</a>

<a href="#">
<span class="material-symbols-outlined">
favorite
</span>
Atividades
</a>

<a href="profile.html">
<span class="material-symbols-outlined">
person
</span>
Perfil
</a>

</nav>
  
<script>
const videos = [
    {
        arquivo: "video/video1.mp4",
        usuario: "@clipzy",
        descricao: "Bem-vindo ao Clipzy!"
    }
];

const feed = document.getElementById("feed");

const biblioteca = [
    "video/video1.mp4"
];

function criarVideo() {

    const arquivo = biblioteca[Math.floor(Math.random() * biblioteca.length)];

    const card = document.createElement("div");
    card.className = "video-card";

    card.innerHTML = `
        <video src="${arquivo}" autoplay muted loop playsinline></video>

        <div class="info">
            <h2>@clipzy</h2>
            <p>Vídeo aleatório</p>
        </div>
    `;

    feed.appendChild(card);

    observer.observe(card);
}

// Carrega os primeiros vídeos
for(let i = 0; i < 8; i++){
    criarVideo();
}

// Feed infinito
window.addEventListener("scroll", () => {
    if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 1000){
        for(let i = 0; i < 5; i++){
            criarVideo();
        }
    }
});

    const info = document.createElement("div");
    info.className = "info";

    info.innerHTML = `
        <h2>${v.usuario}</h2>
        <p>${v.descricao}</p>
    `;

    const actions = document.createElement("div");
    actions.className = "actions";
  
  const like = actions.querySelector(".like");
const texto = like.parentElement.querySelector("div");

let curtido = false;
let curtidas = 0;

like.onclick = () => {

    curtido = !curtido;

    if(curtido){
        curtidas++;
        like.style.transform = "scale(1.2)";
    }else{
        curtidas--;
        like.style.transform = "scale(1)";
    }

    texto.innerText = curtidas;
};

    actions.innerHTML = `
<div>

<md-filled-tonal-icon-button class="like">
<span class="material-symbols-outlined">
favorite
</span>
</md-filled-tonal-icon-button>

<div>0</div>

</div>

<div>

<md-filled-tonal-icon-button>
<span class="material-symbols-outlined">
chat
</span>
</md-filled-tonal-icon-button>

<div>0</div>

</div>

<div>

<md-filled-tonal-icon-button>
<span class="material-symbols-outlined">
share
</span>
</md-filled-tonal-icon-button>

<div>Compartilhar</div>

</div>
`;

    card.appendChild(video);
    card.appendChild(info);
    card.appendChild(actions);

    feed.appendChild(card);

});

const observer = new IntersectionObserver((entries) => {

    entries.forEach(entry => {

        const video = entry.target.querySelector("video");

        if(entry.isIntersecting){
            video.play();
        }else{
            video.pause();
        }

    });

},{threshold:0.75});

document.querySelectorAll(".video-card").forEach(card=>{
    observer.observe(card);
});
</script>

</body>
</html>
