<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clipzy</title>

  <style>
    body {
      margin: 0;
      background: black;
      font-family: Arial;
      color: white;
      overflow: hidden;
    }

    .video-container {
      height: 100vh;
      scroll-snap-type: y mandatory;
      overflow-y: scroll;
    }

    .video {
      height: 100vh;
      scroll-snap-align: start;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .info {
      position: absolute;
      bottom: 80px;
      left: 15px;
    }

    .bottom-bar {
      position: fixed;
      bottom: 0;
      width: 100%;
      height: 60px;
      background: #111;
      display: flex;
      justify-content: space-around;
      align-items: center;
    }

    .btn {
      color: white;
      text-decoration: none;
      font-size: 12px;
    }

    .active {
      color: red;
    }
  </style>
</head>

<body>

<div class="video-container" id="feed"></div>

<div class="bottom-bar">
  <a class="btn active" href="index.html">Home</a>
  <a class="btn" href="#">Discover</a>
  <a class="btn" href="create.html">Create</a>
  <a class="btn" href="#">Notifications</a>
  <a class="btn" href="#">Profile</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://vbxmehiagwjfjmswihwp.supabase.co/rest/v1/";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZieG1laGlhZ3dqZmptc3dpaHdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1ODY3OTcsImV4cCI6MjA5ODE2Mjc5N30.QTdrQygjdwJahpK-jK9HG0vAAsfy0uWk4ojXW4Tv-oo";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function loadVideos() {
  const { data, error } = await supabase
    .from("videos")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.log(error);
    return;
  }

  const feed = document.getElementById("feed");

  data.forEach((video, index) => {
    const div = document.createElement("div");
    div.className = "video";

    div.innerHTML = `
      <video class="clipzy-video" loop muted playsinline>
        <source src="${video.video_url}" type="video/mp4">
      </video>

      <div class="info">
        <h3>@${video.user_id}</h3>
        <p>${video.caption}</p>
      </div>
    `;

    feed.appendChild(div);
  });

  setupAutoplay();
}

function setupAutoplay() {
  const videos = document.querySelectorAll(".clipzy-video");

  const observer = new IntersectionObserver(
    (entries) => {
      entries.forEach(entry => {
        const video = entry.target;

        if (entry.isIntersecting) {
          // pausa todos
          videos.forEach(v => v.pause());

          // toca só o visível
          video.play().catch(() => {});
        } else {
          video.pause();
        }
      });
    },
    {
      threshold: 0.7 // 70% visível
    }
  );

  videos.forEach(video => observer.observe(video));
}

loadVideos();
</script>

</body>
</html>
