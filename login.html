<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Clipzy Login</title>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined">
<script type="module" src="https://esm.run/@material/web/all.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:90%;
    max-width:350px;
    background:#111;
    padding:20px;
    border-radius:12px;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background:#222;
    color:white;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#4fc3f7;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

<h2>Clipzy Login</h2>

<input id="nome" placeholder="Nome de exibição">
<input id="senha" type="password" placeholder="Senha">

<button onclick="entrar()">Entrar / Cadastrar</button>

</div>

<script>
function entrar(){

    const nome = document.getElementById("nome").value;
    const senha = document.getElementById("senha").value;

    if(!nome || !senha){
        alert("Preencha tudo!");
        return;
    }

    const numero = Math.floor(Math.random()*9999);

    const user = "user" + numero;

    localStorage.setItem("clipzy_user", JSON.stringify({
        nomeExibicao: nome,
        senha: senha,
        username: user,
        bio: "Olá, estou usando o Clipzy!"
    }));

    window.location.href = "profile.html";
}
</script>

</body>
</html>
