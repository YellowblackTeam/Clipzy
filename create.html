<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Create Clipzy</title>

<style>
  body {
    margin: 0;
    background: black;
    color: white;
    font-family: Arial;
    padding: 20px;
  }

  h2 {
    margin-bottom: 20px;
  }

  input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    font-size: 14px;
  }

  input {
    background: #111;
    color: white;
  }

  button {
    background: red;
    color: white;
    font-weight: bold;
  }

  button:active {
    transform: scale(0.98);
  }

  .status {
    margin-top: 15px;
    font-size: 14px;
    color: #aaa;
  }

  .bottom {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 60px;
    background: rgba(0,0,0,0.8);
    display: flex;
    justify-content: space-around;
    align-items: center;
    backdrop-filter: blur(10px);
  }

  .bottom a {
    color: white;
    text-decoration: none;
    font-size: 12px;
  }

  .active {
    color: red;
  }
</style>
</head>

<body>

<h2>🎬 Create Video</h2>

<input id="username" placeholder="Nome do perfil">
<input id="title" placeholder="Título do vídeo">
<input type="file" id="file" accept="video/*">

<button onclick="uploadVideo()">Postar</button>

<div class="status" id="status"></div>

<div class="bottom">
  <a href="index.html">Home</a>
  <a href="#">Discover</a>
  <a class="active" href="create.html">Create</a>
  <a href="#">Notif</a>
  <a href="#">Profile</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://vbxmehiagwjfjmswihwp.supabase.co/rest/v1/";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZieG1laGlhZ3dqZmptc3dpaHdwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1ODY3OTcsImV4cCI6MjA5ODE2Mjc5N30.QTdrQygjdwJahpK-jK9HG0vAAsfy0uWk4ojXW4Tv-oo";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function uploadVideo() {
  const user = document.getElementById("username").value;
  const title = document.getElementById("title").value;
  const file = document.getElementById("file").files[0];
  const status = document.getElementById("status");

  if (!user || !title || !file) {
    status.innerText = "Preencha tudo!";
    return;
  }

  status.innerText = "Enviando vídeo...";

  const fileName = Date.now() + "-" + file.name;

  // 1. upload storage
  const { error: uploadError } = await supabase
    .storage
    .from("videos")
    .upload(fileName, file);

  if (uploadError) {
    status.innerText = "Erro upload: " + uploadError.message;
    return;
  }

  // 2. pegar URL pública
  const { data } = supabase
    .storage
    .from("videos")
    .getPublicUrl(fileName);

  const videoUrl = data.publicUrl;

  // 3. salvar no banco
  const { error: dbError } = await supabase
    .from("videos")
    .insert([
      {
        user_id: user,
        video_url: videoUrl,
        caption: title
      }
    ]);

  if (dbError) {
    status.innerText = "Erro DB: " + dbError.message;
    return;
  }

  status.innerText = "Upload completo!";
}
</script>

</body>
</html>
